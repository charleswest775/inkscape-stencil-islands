<svg xmlns="http://www.w3.org/2000/svg" width="360" height="220"
     viewBox="0 0 360 220">
  <!--
    Deterministic stencil test fixture. Known answer:

      * "body"    : the big bar - largest connected piece (the main body).
      * "bullseye": outer disc + ring hole + solid centre dot. Its outer
                    edge dips into the bar, so the disc is part of the body;
                    the CENTRE DOT is an ENCLOSED island (solid at depth 2).
      * "donut"   : outer disc + hole only (no centre). Its outer edge dips
                    into the bar too. The hole is a BARE COUNTER - reported
                    only when "Also flag bare counters" is on.
      * "loose"   : a square that touches nothing - a SEPARATE island.

    Expected detections:
      Report, counters OFF -> 2 islands: 1 enclosed (bullseye centre),
                              1 separate (loose).
      Report, counters ON  -> 3 islands: + 1 counter (donut hole).
      Bridge -> connectors for the enclosed + separate; counter skipped
                with a message. Delete -> centre dot subpath removed from
                bullseye, "loose" removed entirely.
  -->
  <rect id="body" x="10" y="160" width="340" height="50" fill="#111111"/>

  <path id="bullseye" fill="#111111" fill-rule="evenodd"
        d="M 22 120 a 48 48 0 1 0 96 0 a 48 48 0 1 0 -96 0 Z
           M 40 120 a 30 30 0 1 0 60 0 a 30 30 0 1 0 -60 0 Z
           M 58 120 a 12 12 0 1 0 24 0 a 12 12 0 1 0 -24 0 Z"/>

  <path id="donut" fill="#111111" fill-rule="evenodd"
        d="M 152 120 a 48 48 0 1 0 96 0 a 48 48 0 1 0 -96 0 Z
           M 176 120 a 24 24 0 1 0 48 0 a 24 24 0 1 0 -48 0 Z"/>

  <rect id="loose" x="300" y="20" width="44" height="44" fill="#111111"/>
</svg>
