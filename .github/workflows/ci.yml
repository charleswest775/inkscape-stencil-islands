name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # inkex is pinned: unpinned, pip resolves a newer release on Linux
        # that drags in PyGObject (a GUI lib this extension never uses) and
        # fails to build without system cairo/girepository. 1.0.1 needs only
        # lxml and exercises the same stable inkex API we rely on. At runtime
        # the extension uses whatever inkex ships inside the user's Inkscape.
        run: |
          python -m pip install --upgrade pip
          python -m pip install "inkex==1.0.1" numpy pytest

      - name: Validate INX is well-formed XML
        run: python -c "import xml.etree.ElementTree as ET; ET.parse('stencil_islands.inx')"

      - name: Byte-compile sources
        run: python -m compileall -q stencil_islands.py si_geometry.py si_islands.py si_bridges.py install.py

      - name: Run tests
        run: python -m pytest -q
