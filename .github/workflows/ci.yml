name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # inkex 1.0.1 is not numpy-2 safe (breaks on py3.11/3.12). inkex
        # 1.4.1 matches modern Inkscape and is correct, but its declared
        # deps pull PyGObject (no Linux wheel, needs system
        # cairo/girepository, and is never used by extensions). So install
        # inkex without its deps, then only the libraries its import chain
        # actually needs. At runtime the extension uses whatever inkex ships
        # inside the user's Inkscape.
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-deps "inkex==1.4.1"
          python -m pip install lxml cssselect numpy tinycss2 pytest

      - name: Validate INX is well-formed XML
        run: python -c "import xml.etree.ElementTree as ET; ET.parse('stencil_islands.inx')"

      - name: Byte-compile sources
        run: python -m compileall -q stencil_islands.py si_geometry.py si_islands.py si_bridges.py install.py

      - name: Run tests
        run: python -m pytest -q
